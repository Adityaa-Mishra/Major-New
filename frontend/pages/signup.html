<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up — MyHome Worker</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/animations.css" />
</head>
<body>
<div class="auth-page">
  <div class="auth-card slide-up">
    <div class="auth-logo">
      <a href="/"><span class="logo-icon">⚡</span> MyHome<strong>Worker</strong></a>
    </div>
    <h2>Create an account</h2>
    <p>Join thousands of users on MyHome Worker</p>

    <div class="form-group">
      <label>I want to</label>
      <div class="role-selector">
        <div class="role-btn active" id="roleUser" onclick="setRole('user')">
          <div class="role-icon">🏠</div>
          <strong>Hire Workers</strong>
          <span>Find & book services</span>
        </div>
        <div class="role-btn" id="roleProvider" onclick="setRole('provider')">
          <div class="role-icon">👷</div>
          <strong>Offer Services</strong>
          <span>Grow my business</span>
        </div>
      </div>
    </div>

    <div class="form-error" id="formError"></div>

    <div class="form-row">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="name" placeholder="Ravi Kumar" />
      </div>
      <div class="form-group">
        <label>Phone</label>
        <input type="tel" id="phone" placeholder="+91 98765 43210" />
      </div>
    </div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="you@example.com" />
    </div>
    <div class="form-group">
      <label>Location / City</label>
      <input type="text" id="location" placeholder="Delhi, Mumbai, Bangalore..." />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Min 6 characters" />
    </div>

    <button class="btn-primary btn-full" id="signupBtn" onclick="handleSignup()">Create Account</button>
    <div class="auth-footer">
      Already have an account? <a href="login.html">Login</a>
    </div>
  </div>
</div>
<script src="../js/api.js"></script>
<script>
let selectedRole = 'user';

// Check URL param
const urlRole = new URLSearchParams(window.location.search).get('role');
if (urlRole === 'provider') setRole('provider');

function setRole(role) {
  selectedRole = role;
  document.getElementById('roleUser').classList.toggle('active', role === 'user');
  document.getElementById('roleProvider').classList.toggle('active', role === 'provider');
}

async function handleSignup() {
  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const phone = document.getElementById('phone').value.trim();
  const location = document.getElementById('location').value.trim();
  const err = document.getElementById('formError');
  const btn = document.getElementById('signupBtn');
  err.classList.remove('show');
  if (!name || !email || !password) { err.textContent = 'Name, email and password are required'; err.classList.add('show'); return; }
  if (password.length < 6) { err.textContent = 'Password must be at least 6 characters'; err.classList.add('show'); return; }
  btn.classList.add('btn-loading'); btn.textContent = 'Creating account...';
  try {
    const data = await api.register({ name, email, password, role: selectedRole, phone, location });
    api.setAuth(data.token, data.user);
    toast('Account created! Welcome!', 'success');
    setTimeout(() => {
      window.location.href = data.user.role === 'provider' ? 'provider-dashboard.html' : 'user-dashboard.html';
    }, 700);
  } catch (e) {
    err.textContent = e.message; err.classList.add('show');
    btn.classList.remove('btn-loading'); btn.textContent = 'Create Account';
  }
}
</script>
</body>
</html>
