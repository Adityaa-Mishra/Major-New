<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — MyHome Worker</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/animations.css" />
</head>
<body>
<div class="auth-page">
  <div class="auth-card slide-up">
    <div class="auth-logo">
      <a href="/"><span class="logo-icon">⚡</span> MyHome<strong>Worker</strong></a>
    </div>
    <h2>Welcome back</h2>
    <p>Login to your account to continue</p>
    <div class="form-error" id="formError"></div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="you@example.com" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" />
    </div>
    <button class="btn-primary btn-full" id="loginBtn" onclick="handleLogin()">Login</button>
    <div class="auth-footer">
      Don't have an account? <a href="signup.html">Sign up</a>
    </div>
  </div>
</div>
<script src="../js/api.js"></script>
<script>
// Redirect if already logged in
if (api.isLoggedIn()) {
  const u = api.getUser();
  window.location.href = u.role === 'provider' ? 'provider-dashboard.html' : 'user-dashboard.html';
}

async function handleLogin() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const err = document.getElementById('formError');
  const btn = document.getElementById('loginBtn');
  err.classList.remove('show');
  if (!email || !password) { err.textContent = 'Please fill all fields'; err.classList.add('show'); return; }
  btn.classList.add('btn-loading'); btn.textContent = 'Logging in...';
  try {
    const data = await api.login({ email, password });
    api.setAuth(data.token, data.user);
    toast('Welcome back!', 'success');
    setTimeout(() => {
      window.location.href = data.user.role === 'provider' ? 'provider-dashboard.html' : 'user-dashboard.html';
    }, 600);
  } catch (e) {
    err.textContent = e.message; err.classList.add('show');
    btn.classList.remove('btn-loading'); btn.textContent = 'Login';
  }
}
document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
</script>
</body>
</html>
